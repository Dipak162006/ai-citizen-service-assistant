<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Citizen Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px var(--shadow-color);
        }
        .form-control {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
        }
        .form-control:focus {
            background-color: var(--bg-surface);
            border-color: var(--accent-primary);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.25rem var(--accent-glow);
        }
        .btn-login {
            background: var(--accent-primary);
            color: #ffffff;
            font-weight: 600;
            border: none;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
            color: #ffffff;
        }
        .link-text {
            color: var(--accent-primary);
            text-decoration: none;
        }
        .link-text:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script>
        const theme = localStorage.getItem('site_theme');
        if (theme === 'light') document.body.classList.add('theme-light');
    </script>

    <!-- Dynamic Animated Background -->
    <div class="dynamic-bg-wrapper">
        <div class="dynamic-bg-blob blob-1"></div>
        <div class="dynamic-bg-blob blob-2"></div>
    </div>

    <a href="/" class="theme-text-secondary text-decoration-none position-absolute top-0 start-0 m-4">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </a>
    <div class="login-card">
        <div class="text-center mb-4">
            <div class="ai-logo-container mx-auto mb-3" style="width: 64px; height: 64px;">
                <svg class="ai-logo-svg" viewBox="0 0 40 40">
                    <circle class="ai-logo-glow" cx="20" cy="20" r="12" />
                    <circle class="ai-logo-outer-ring" cx="20" cy="20" r="16" />
                    <path class="ai-robot-path" d="M20,11c-0.6,0-1,0.4-1,1v1h-2c-1.1,0-2,0.9-2,2v6c0,1.1,0.9,2,2,2h6c1.1,0,2-0.9,2-2v-6c0-1.1-0.9-2-2-2h-2v-1C21,11.4,20.6,11,20,11z M17.5,16c0.3,0,0.5,0.2,0.5,0.5S17.8,17,17.5,17S17,16.8,17,16.5S17.2,16,17.5,16z M22.5,16c0.3,0,0.5,0.2,0.5,0.5S22.8,17,22.5,17S22,16.8,22,16.5S22.2,16,22.5,16z M18,20h4v1h-4V20z" />
                </svg>
            </div>
            <h1 class="h3 fw-bold theme-text-primary">Welcome Back</h1>
            <p class="theme-text-secondary">Login in to access your dashboard</p>
        </div>
        
        <div id="alert" class="alert d-none"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label theme-text-secondary">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text theme-bg-surface theme-border-subtle theme-text-secondary"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label theme-text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text theme-bg-surface theme-border-subtle theme-text-secondary"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="btn btn-login w-100 py-2 mb-3">Login</button>
            
            <div class="d-flex align-items-center mb-3">
                <hr class="flex-grow-1 theme-border-subtle">
                <span class="mx-2 theme-text-secondary small">OR</span>
                <hr class="flex-grow-1 theme-border-subtle">
            </div>

            <a href="/login/google" class="btn btn-outline-secondary w-100 py-2 mb-3 d-flex align-items-center justify-content-center gap-2 theme-text-primary" style="border-radius: 8px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" style="width: 20px; height: 20px;">
                Continue with Google
            </a>
            
            <div class="text-center">
                <small class="theme-text-secondary">Don't have an account? <a href="/register" class="link-text">Create Account</a></small>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alert = document.getElementById('alert');
            const btn = document.querySelector('button[type="submit"]');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Login in...';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = data.redirect;
                } else {
                    alert.textContent = data.error;
                    alert.className = 'alert alert-danger';
                    btn.disabled = false;
                    btn.innerText = 'Login';
                }
            } catch (err) {
                alert.textContent = "Connection error";
                alert.className = 'alert alert-danger';
                btn.disabled = false;
                btn.innerText = 'Login';
            }
        });
    </script>
</body>
</html>
