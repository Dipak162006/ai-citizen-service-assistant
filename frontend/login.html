<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Citizen Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a2e23, var(--bg-dark));
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .form-control {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .form-control:focus {
            background-color: var(--bg-surface);
            border-color: var(--accent-green);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.25rem rgba(0, 230, 118, 0.1);
        }
        .btn-login {
            background: var(--accent-green);
            color: #000;
            font-weight: 600;
            border: none;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        .link-text {
            color: var(--accent-green);
            text-decoration: none;
        }
        .link-text:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="/" class="text-secondary text-decoration-none position-absolute top-0 start-0 m-4">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </a>
    <div class="login-card">
        <div class="text-center mb-4">
            <h1 class="h3 fw-bold text-white"><i class="fa-solid fa-robot me-2 text-success"></i>Welcome Back</h1>
            <p class="text-secondary">Login in to access your dashboard</p>
        </div>
        
        <div id="alert" class="alert d-none"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-secondary">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" required placeholder="name@example.com">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="btn btn-login w-100 py-2 mb-3">Login</button>
            
            <div class="text-center">
                <small class="text-secondary">Don't have an account? <a href="/register" class="link-text">Create Account</a></small>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alert = document.getElementById('alert');
            const btn = document.querySelector('button[type="submit"]');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Login in...';

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = data.redirect;
                } else {
                    alert.textContent = data.error;
                    alert.className = 'alert alert-danger';
                    btn.disabled = false;
                    btn.innerText = 'Login';
                }
            } catch (err) {
                alert.textContent = "Connection error";
                alert.className = 'alert alert-danger';
                btn.disabled = false;
                btn.innerText = 'Login';
            }
        });
    </script>
</body>
</html>
